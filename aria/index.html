<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA — Assistente de Radiologia por IA</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2e3345;
      --text: #e4e6ef;
      --text-muted: #8b8fa3;
      --accent: #6c5ce7;
      --accent-hover: #7f71ed;
      --user-bg: #6c5ce7;
      --bot-bg: #242836;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }
    .header .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .header .subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ed573;
      margin-left: auto;
    }

    /* Chat area */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 720px;
      width: fit-content;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .message.user {
      background: var(--user-bg);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .message.bot {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .message .sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    .message .sources span {
      display: block;
      margin-bottom: 2px;
    }

    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .welcome h2 {
      font-size: 22px;
      color: var(--text);
      margin-bottom: 8px;
    }
    .welcome p { font-size: 14px; max-width: 400px; margin: 0 auto; }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }
    .suggestions button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
    }
    .suggestions button:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      align-self: flex-start;
    }
    .typing span {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: .3; }
      40% { opacity: 1; }
    }

    /* Input */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .input-row {
      display: flex;
      gap: 10px;
      max-width: 720px;
      margin: 0 auto;
    }
    .input-row textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      transition: border-color .15s;
    }
    .input-row textarea:focus {
      border-color: var(--accent);
    }
    .input-row button {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      padding: 12px 18px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background .15s;
      align-self: flex-end;
    }
    .input-row button:hover { background: var(--accent-hover); }
    .input-row button:disabled { opacity: .5; cursor: not-allowed; }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">A</div>
    <div>
      <h1>ARIA</h1>
      <div class="subtitle">Assistente de Radiologia por IA</div>
    </div>
    <div class="status-dot" title="Online"></div>
  </div>

  <div class="chat" id="chat">
    <div class="welcome">
      <h2>Olá! Sou a ARIA 🩻</h2>
      <p>Assistente de inteligência artificial especializada em radiologia e diagnóstico por imagem. Pergunte sobre qualquer tema da base de conhecimento.</p>
      <div class="suggestions">
        <button onclick="sendSuggestion('O que é BI-RADS?')">O que é BI-RADS?</button>
        <button onclick="sendSuggestion('Explique anatomia da mama')">Anatomia da mama</button>
        <button onclick="sendSuggestion('Técnica radiológica do tórax')">Técnica radiológica</button>
        <button onclick="sendSuggestion('Quais são os pilares do diagnóstico por imagem?')">Pilares do diagnóstico</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Digite sua pergunta..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button id="send" onclick="send()">➤</button>
    </div>
    <div class="footer-note">ARIA pode cometer erros. Sempre confirme informações clínicas com fontes oficiais.</div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const API_URL = window.API_URL
      || urlParams.get('api')
      || 'https://aria-backend-production-176b.up.railway.app/chat';
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    let busy = false;

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    }

    function sendSuggestion(text) {
      input.value = text;
      send();
    }

    function addMessage(text, isUser, sources) {
      // Remove welcome if present
      const welcome = chat.querySelector('.welcome');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = 'message ' + (isUser ? 'user' : 'bot');

      let html = text;
      if (sources && sources.length > 0) {
        html += '<div class="sources"><strong>📚 Fontes:</strong>';
        sources.forEach(s => {
          const pages = s.page_start ? ` (p. ${s.page_start}${s.page_end ? '-' + s.page_end : ''})` : '';
          html += `<span>• ${s.title}${pages}</span>`;
        });
        html += '</div>';
      }
      div.innerHTML = html;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function send() {
      const question = input.value.trim();
      if (!question || busy) return;

      busy = true;
      sendBtn.disabled = true;
      input.value = '';
      input.style.height = 'auto';

      addMessage(question, true);
      showTyping();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, top_k: 5 }),
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          addMessage(`Erro: ${err.detail || 'Falha na conexão com o servidor.'}`, false);
        } else {
          const data = await res.json();
          addMessage(data.answer, false, data.sources);
        }
      } catch (err) {
        removeTyping();
        addMessage('Não foi possível conectar ao servidor ARIA. Verifique se o backend está rodando.', false);
      }

      busy = false;
      sendBtn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
